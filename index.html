<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappa di Villanova Antica</title>

<!-- Libreria Leaflet (CSS + JS) via CDN, nessuna installazione richiesta -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-groupedlayercontrol@0.6.1/dist/leaflet.groupedlayercontrol.min.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet-groupedlayercontrol@0.6.1/dist/leaflet.groupedlayercontrol.min.js"></script>
<script src="https://unpkg.com/@ngageoint/geopackage/dist/geopackage.min.js"></script>
<script src="https://unpkg.com/leaflet-textpath@1.2.3/leaflet.textpath.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }
  #map {
    width: 100%;
    height: 100vh;
  }
  /* Un po' di stile in più per il pannello dei layer generato da Leaflet */
  .leaflet-control-layers {
    font-size: 14px;
  }
</style>
</head>
<body>

<div id="map"></div>

<script>
  // ============================
  // 1. INIZIALIZZAZIONE MAPPA
  // ============================
  // Coordinate di partenza: da modificare con il centro della zona di interesse
  const map = L.map('map').setView([44.9409, 7.9545], 13);
  L.control.scale({ position: 'bottomleft', imperial: false }).addTo(map);
  // Layer: OpenStreetMap - gratuito e open source
  const osmBase = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  });

  // ============================
  // 2. LAYER WMS - REGIONE PIEMONTE
  // ============================
  // Layer: Originali di impianto catastali
  const catastoOI = L.tileLayer.wms('https://wmtscatasto-gis.csi.it/mapproxy/service', {
    layers: 'regp_catasto_oi',
    format: 'image/png',
    transparent: true,
    version: '1.3.0',
    attribution: 'Regione Piemonte - CSI Piemonte'
  });

  // Layer di base (sfondo cartografico): Sfondo Cartografico Regione Piemonte (BDTRE)
const sfondoBDTRE = L.tileLayer.wms('https://geomap.reteunitaria.piemonte.it/mapproxy/service', {
    layers: 'regp_sfondo_bdtre_epsg3857',
    format: 'image/png',
    transparent: true,
    version: '1.3.0',
    attribution: 'Regione Piemonte'
}).addTo(map);

  // Layer: Ortofoto AGEA 2024
  const ortofotoAGEA = L.tileLayer.wms('https://opengis.csi.it/mp/regp_agea_2024/service', {
    layers: 'regp_agea_2024',
    format: 'image/png',
    transparent: true,
    version: '1.3.0',
    attribution: 'AGEA / Regione Piemonte - CSI Piemonte'
  });
  // Layer: Limiti comunali
  const limitiComunali = L.tileLayer.wms('https://geomap.reteunitaria.piemonte.it/ws/taims/rp-01/taimswms/bdtre_aggr', {
    layers: 'lim_com',
    format: 'image/png',
    transparent: true,
    version: '1.3.0',
    attribution: 'Regione Piemonte'
  });

// ============================
// LAYER GPKG - STRADE ANTICHE
// ============================
window.GeoPackage.setSqljsWasmLocateFile(file => 'https://unpkg.com/@ngageoint/geopackage/dist/' + file);

const stradeAnticheLayer = L.layerGroup();

// Zoom minimo a partire dal quale mostrare le etichette con il nome della strada
const ZOOM_MINIMO_ETICHETTE = 15;

// Teniamo traccia di ogni linea e del suo nome, per poter accendere/spegnere il testo
const stradeConEtichetta = [];

fetch('data/strade.gpkg')
  .then(response => response.arrayBuffer())
  .then(arrayBuffer => window.GeoPackage.GeoPackageAPI.open(new Uint8Array(arrayBuffer)))
  .then(geoPackage => {
    const featureDao = geoPackage.getFeatureDao('strade');
    const iterator = featureDao.queryForEach();

    for (const row of iterator) {
      const feature = featureDao.getRow(row);
      const geometry = feature.geometry;
      if (!geometry) continue;

      const geoJsonGeom = geometry.geometry.toGeoJSON();
      const nomeStrada = feature.values['nome_strada'] || '';

      // Linea visibile, con la geometria originale precisa
    const lineLayer = L.geoJSON(geoJsonGeom, {
      style: { color: '#c0392b', weight: 3 }
    });
    lineLayer.addTo(stradeAnticheLayer);
    
    // Linea invisibile e semplificata, usata solo come binario per il testo
    if (nomeStrada) {
      const geomSemplificata = turf.simplify(geoJsonGeom, { tolerance: 0.0003, highQuality: true });
    
      const linePerTesto = L.geoJSON(geomSemplificata, {
        style: { opacity: 0, weight: 0 }
      });
    
      linePerTesto.eachLayer(function (layer) {
        stradeConEtichetta.push({ layer: layer, nome: nomeStrada });
      });
    
      linePerTesto.addTo(stradeAnticheLayer);
    }

    // Applica lo stato iniziale delle etichette in base allo zoom corrente
    aggiornaEtichette();
  })
  .catch(err => console.error('Errore nel caricamento del GeoPackage:', err));

// Accende o spegne le etichette in base al livello di zoom attuale della mappa
function aggiornaEtichette() {
  const zoomAttuale = map.getZoom();
  stradeConEtichetta.forEach(function (item) {
    // Rimuovi sempre il testo esistente prima di eventualmente ridisegnarlo
    item.layer.setText(null);

    if (zoomAttuale >= ZOOM_MINIMO_ETICHETTE) {
      item.layer.setText(item.nome, {
        repeat: false,
        center: true,
        offset: -6,
        attributes: { fill: '#c0392b', 'font-size': '13', 'font-weight': 'bold' }
      });
    }
  });
}

// Richiama la funzione ogni volta che l'utente cambia zoom
map.on('zoomend', aggiornaEtichette);
  
  // ============================
  // 3. PANNELLO CHECKBOX LAYER
  // ============================
  // baseMaps = layer di sfondo (mutuamente esclusivi, radio button)
  const baseMaps = {
      "Sfondo cartografico - Regione Piemonte": sfondoBDTRE,
      "Sfondo cartografico - OpenStreetMap": osmBase
  };


  // Layers
  const groupedOverlays = {
      "Livelli": {
          "Satellite (Ortofoto AGEA 2024)": ortofotoAGEA,
          "Originali di impianto catastali": catastoOI,
          "Confini amministrativi (Limiti comunali 2026)": limitiComunali
      },
      "Dati di progetto": {
          "Strade antiche": stradeAnticheLayer
      }
  };

L.control.groupedLayers(baseMaps, groupedOverlays, { collapsed: false, groupCheckboxes: false }).addTo(map);
stradeAnticheLayer.addTo(map);
  
</script>
</body>
</html>
